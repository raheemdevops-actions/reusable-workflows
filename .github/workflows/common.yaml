name: common-ci-cd
on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      app-type:
        required: true
        type: string

jobs:
  ci:
    runs-on: self-hosted
    steps:
    - name: checkout
      uses : actions/checkout@v5

    - name: display the files
      run : ls -la

    - name:  print inputs
      run : echo "Project ${{ inputs.project }}"
      